<!DOCTYPE html>
<html>
<head>
  <title>Random Guitar Song Generator</title>
</head>
<body style="background:#0B1F3A; color:white; font-family:Arial; text-align:center; padding:40px;">

  <nav>
    <a style="color:white; margin:15px;" href="index.html">Home</a>
    <a style="color:white; margin:15px;" href="resume.html">Resume</a>
    <a style="color:white; margin:15px;" href="scratch.html">Scratch Page</a>
  </nav>

  <h1 style="color:#D4A017;">Random Guitar Song Generator</h1>
  <p>Click the button to get a popular song to learn on guitar.</p>

  <button onclick="generateSong()" style="padding:15px 25px; background:#D4A017; border:none; border-radius:8px; font-weight:bold;">
    Generate Song
  </button>

  <div id="result" style="background:white; color:black; margin:30px auto; padding:25px; max-width:500px; border-radius:12px;">
    Your song will appear here.
  </div>

  <script>
    const songs = [
      "Wonderwall - Oasis",
      "Riptide - Vance Joy",
      "Knockin' on Heaven's Door - Bob Dylan",
      "Take Me Home, Country Roads - John Denver",
      "Sweet Home Alabama - Lynyrd Skynyrd",
      "Hotel California - Eagles",
      "Good Riddance - Green Day"
    ];

    function generateSong() {
      const randomIndex = Math.floor(Math.random() * songs.length);
      document.getElementById("result").innerHTML = songs[randomIndex];
    }
  </script>

</body>
</html>
